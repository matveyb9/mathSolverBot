services:
  equation-bot:
    build: .
    image: equation-bot:latest
    container_name: equation-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # No ports needed — bot uses long polling
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
